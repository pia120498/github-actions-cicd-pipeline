services:
  mysql:
    image: mysql:8.4
    container_name: mysql-dev

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: taskdb

    ports:
      - "3306:3306"

    volumes:
      - mysql-data:/var/lib/mysql
      - ./app/schema.sql:/docker-entrypoint-initdb.d/schema.sql

    restart: unless-stopped

volumes:
  mysql-data: